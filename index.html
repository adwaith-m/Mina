<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Mina 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    overflow: hidden;
    text-align: center;
    font-family: 'Quicksand', sans-serif;
    background: linear-gradient(to bottom, #ff9a9e, #fad0c4, #fbc2eb);
}

/* TITLE */
h1 {
    margin-top: 40px;
    font-family: 'Playfair Display', serif;
    font-size: 3rem;
    color: white;
    text-shadow: 0 0 10px rgba(255,255,255,0.6);
}

/* TEXT */
p {
    font-size: 1.2rem;
    color: white;
}

/* CARD */
.card {
    width: 280px;
    height: 280px;
    margin: 20px auto;
    perspective: 1000px;
}

.card-inner {
    width: 100%;
    height: 100%;
    transition: transform 0.8s;
    transform-style: preserve-3d;
}

.card:hover .card-inner,
.card.flip .card-inner {
    transform: rotateY(180deg);
}

.card-front, .card-back {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    backface-visibility: hidden;
}

.card-front img {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    border: 5px solid white;
}

.card-back {
    background: white;
    color: #ff4d6d;
    transform: rotateY(180deg);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    font-weight: 600;
}

/* 🎈 BALLOONS */
.balloon {
    position: absolute;
    width: 50px;
    height: 65px;
    border-radius: 50%;
    animation: float 10s linear infinite;
}

.balloon::after {
    content: "";
    position: absolute;
    width: 2px;
    height: 60px;
    background: white;
    top: 65px;
    left: 50%;
}

@keyframes float {
    0% { bottom: -100px; }
    100% { bottom: 110vh; }
}

/* 🌸 FLOWERS */
.flower {
    position: absolute;
    opacity: 0.9;
    animation: floatFlower 6s ease-in-out infinite;
}

@keyframes floatFlower {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
}

/* 🎉 CONFETTI */
.confetti {
    position: fixed;
    width: 12px;
    height: 16px;
    top: -20px;
    opacity: 1;
    animation: fall 5s linear forwards;
}

@keyframes fall {
    0% {
        transform: translateY(0) rotate(0deg);
    }
    100% {
        transform: translateY(130vh) rotate(720deg);
        opacity: 0;
    }
}

/* bottom glow */
.bottom-glow {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 40%;
    background: radial-gradient(circle, rgba(255,255,255,0.2), transparent);
}

</style>
</head>

<body>

<h1>Happy Birthday Mina 🎂💖</h1>

<p>Wishing you a day filled with happiness, smiles, and everything you love 🌸✨</p>

<!-- CARD -->
<div class="card" onclick="this.classList.toggle('flip')">
    <div class="card-inner">
        <div class="card-front">
            <img src="mina.jpg">
        </div>
        <div class="card-back">
            this is a small present from me,<br>
            hope u like it and have a great day 💖
        </div>
    </div>
</div>

<!-- 🎈 BALLOONS -->
<div class="balloon" style="left:10%; background:#ff4d6d;"></div>
<div class="balloon" style="left:20%; background:#ffafcc;"></div>
<div class="balloon" style="left:80%; background:#a2d2ff;"></div>

<!-- 🌸 FLOWERS -->
<img class="flower" src="flower1.png" style="top:10%; left:10%; width:70px;">
<img class="flower" src="flower3.png" style="top:20%; left:85%; width:80px;">
<img class="flower" src="flower4.png" style="top:60%; left:5%; width:75px;">
<img class="flower" src="flower1.png" style="top:75%; left:85%; width:90px;">
<img class="flower" src="flower3.png" style="top:85%; left:30%; width:70px;">
<img class="flower" src="flower4.png" style="top:50%; left:50%; width:80px;">

<div class="bottom-glow"></div>
<script>
function popConfetti() {
    for(let i = 0; i < 120; i++) {
        let conf = document.createElement("div");
        conf.className = "confetti";

        conf.style.left = Math.random() * 100 + "vw";

        conf.style.backgroundColor = [
            "#ff4d6d","#ffd166","#06d6a0","#118ab2","#ffffff"
        ][Math.floor(Math.random()*5)];

        conf.style.animationDuration = (Math.random()*2 + 4) + "s";

        document.body.appendChild(conf);

        // REMOVE LATER (not too early)
        setTimeout(() => conf.remove(), 7000);
    }
}

window.addEventListener("load", () => {
    setTimeout(popConfetti, 300);
});

document.body.addEventListener("click", popConfetti);
</script>
</body>
</html>
