<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Mina 💖</title>

<!-- Better Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    overflow: hidden;
    text-align: center;
    font-family: 'Quicksand', sans-serif;
    background: linear-gradient(to bottom, #ff9a9e 0%, #fad0c4 40%, #fbc2eb 100%);
}

/* TITLE */
h1 {
    margin-top: 40px;
    font-family: 'Playfair Display', serif;
    font-size: 3rem;
    color: white;
    letter-spacing: 2px;
}

/* TEXT */
p {
    font-size: 1.2rem;
    color: white;
    opacity: 0.95;
}

/* CARD */
.card {
    width: 280px;
    height: 280px;
    margin: 20px auto;
    perspective: 1000px;
}

.card-inner {
    width: 100%;
    height: 100%;
    transition: transform 0.8s;
    transform-style: preserve-3d;
}

.card:hover .card-inner,
.card.flip .card-inner {
    transform: rotateY(180deg);
}

.card-front, .card-back {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    backface-visibility: hidden;
}

.card-front img {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    border: 5px solid white;
}

.card-back {
    background: white;
    color: #ff4d6d;
    transform: rotateY(180deg);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    font-weight: 600;
}

/* 🎈 BALLOONS */
.balloon {
    position: absolute;
    width: 50px;
    height: 65px;
    border-radius: 50%;
    animation: float 10s infinite linear;
}

.balloon::after {
    content: "";
    position: absolute;
    width: 2px;
    height: 60px;
    background: white;
    top: 65px;
    left: 50%;
}

@keyframes float {
    0% { bottom: -100px; }
    100% { bottom: 110vh; }
}

/* 🌸 FLOWERS */
.flower {
    position: absolute;
    opacity: 0.9;
    animation: floatFlower 6s ease-in-out infinite;
}

@keyframes floatFlower {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-8px); }
    100% { transform: translateY(0px); }
}

/* 🎉 CONFETTI */
.confetti {
    position: absolute;
    width: 10px;
    height: 14px;
    opacity: 0.8;
    animation: burst 3s linear forwards;
}

@keyframes burst {
    0% {
        transform: translate(0,0) rotate(0deg);
    }
    100% {
        transform: translate(var(--x), var(--y)) rotate(720deg);
    }
}

/* bottom glow (fix emptiness) */
.bottom-glow {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 40%;
    background: radial-gradient(circle at center, rgba(255,255,255,0.2), transparent);
}

</style>
</head>

<body>

<h1>Happy Birthday Mina 🎂💖</h1>

<p>Wishing you a day filled with happiness, smiles, and everything you love 🌸✨</p>

<!-- CARD -->
<div class="card" onclick="this.classList.toggle('flip')">
    <div class="card-inner">
        <div class="card-front">
            <img src="mina.jpg">
        </div>
        <div class="card-back">
            this is a small present from me,<br>
            hope u like it and have a great day 💖
        </div>
    </div>
</div>

<!-- 🎈 BALLOONS -->
<div class="balloon" style="left:10%; background:#ff4d6d;"></div>
<div class="balloon" style="left:20%; background:#ffafcc;"></div>
<div class="balloon" style="left:80%; background:#a2d2ff;"></div>
<div class="balloon" style="left:70%; background:#cdb4db;"></div>

<!-- 🌸 FLOWERS -->
<img class="flower" src="flower1.png" style="top:10%; left:10%; width:70px;">
<img class="flower" src="flower3.png" style="top:20%; left:85%; width:80px;">
<img class="flower" src="flower4.png" style="top:60%; left:5%; width:75px;">
<img class="flower" src="flower1.png" style="top:75%; left:85%; width:90px;">
<img class="flower" src="flower3.png" style="top:85%; left:30%; width:70px;">
<img class="flower" src="flower4.png" style="top:50%; left:50%; width:80px;">

<div class="bottom-glow"></div>

<script>

/* 🎉 CONFETTI BURST FROM SIDES */
function popConfetti() {
    for(let i=0; i<120; i++){
        let conf = document.createElement("div");
        conf.classList.add("confetti");

        conf.style.left = (i % 2 === 0) ? "0%" : "100%";
        conf.style.top = "50%";

        let x = (Math.random()*400 - 200) + "px";
        let y = (Math.random()*400 - 200) + "px";

        conf.style.setProperty('--x', x);
        conf.style.setProperty('--y', y);

        conf.style.background = ["#fff","#ff4d6d","#ffd166","#06d6a0","#118ab2"][Math.floor(Math.random()*5)];

        document.body.appendChild(conf);
    }
}

window.onload = popConfetti;

</script>

</body>
</html>
